<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karriere</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --paper: #f7f4ee;
  --paper-dim: #efeae0;
  --ink: #1a1a1a;
  --ink-soft: rgba(26,26,26,0.6);
  --ink-faint: rgba(26,26,26,0.35);
  --rule: rgba(26,26,26,0.12);
  --amber: #c2410c;
  --sage: #5b7a6b;
  --dustred: #9b4444;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

.wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 56px 28px 100px;
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--ink-soft);
  text-decoration: none;
  margin-bottom: 36px;
  transition: color 0.15s;
}

.back-link:hover { color: var(--amber); }

.masthead-small {
  font-family: 'Source Serif 4', serif;
  font-weight: 700;
  font-size: 18px;
  margin-bottom: 4px;
}

/* ── HEADER ── */
.career-header {
  border-bottom: 2px solid var(--ink);
  padding-bottom: 28px;
  margin-bottom: 40px;
}

.career-tag {
  font-size: 11px;
  font-weight: 600;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

.career-title {
  font-family: 'Source Serif 4', serif;
  font-weight: 700;
  font-size: clamp(32px, 6vw, 44px);
  line-height: 1.1;
  margin-bottom: 14px;
}

.career-tagline {
  font-size: 17px;
  color: var(--ink-soft);
  font-style: italic;
  font-family: 'Source Serif 4', serif;
}

/* ── SECTION ── */
.section {
  margin-bottom: 48px;
}

.section-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-faint);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--rule);
}

.section-body {
  font-size: 16px;
  line-height: 1.7;
  color: var(--ink);
}

/* ── PAIN POINTS LIST ── */
.pain-list {
  list-style: none;
}

.pain-list li {
  position: relative;
  padding-left: 22px;
  margin-bottom: 14px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--ink);
}

.pain-list li::before {
  content: "—";
  position: absolute;
  left: 0;
  color: var(--amber);
  font-weight: 700;
}

/* ── DAY IN THE LIFE ── */
.dayinlife-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

@media (max-width: 600px) {
  .dayinlife-grid { grid-template-columns: 1fr; }
}

.dayinlife-card {
  background: var(--paper-dim);
  border-radius: 4px;
  padding: 18px 20px;
}

.dayinlife-role {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--ink-faint);
  margin-bottom: 8px;
}

.dayinlife-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink-soft);
}

/* ── SALARY BARS (signature element) ── */
.salary-track {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.salary-row {
  display: grid;
  grid-template-columns: 70px 1fr;
  align-items: center;
  gap: 16px;
}

.salary-stage {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-faint);
}

.salary-bar-shell {
  position: relative;
  height: 34px;
  background: var(--paper-dim);
  border-radius: 4px;
  overflow: hidden;
}

.salary-bar-fill {
  height: 100%;
  background: var(--ink);
  border-radius: 4px;
  display: flex;
  align-items: center;
  transition: width 1.1s cubic-bezier(0.16, 1, 0.3, 1);
}

.salary-row:nth-child(1) .salary-bar-fill { background: var(--ink-faint); width: 0; }
.salary-row:nth-child(2) .salary-bar-fill { background: var(--sage); width: 0; }
.salary-row:nth-child(3) .salary-bar-fill { background: var(--amber); width: 0; }

.salary-value {
  font-size: 12px;
  font-weight: 600;
  color: var(--paper);
  padding-left: 14px;
  white-space: nowrap;
}

.salary-row:nth-child(1) .salary-value { color: var(--ink); padding-left: 0; margin-left: 14px; }

/* ── SCOPE ── */
.scope-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

@media (max-width: 600px) {
  .scope-grid { grid-template-columns: 1fr; }
}

.scope-card .section-label { border-bottom: none; padding-bottom: 0; margin-bottom: 8px; }

/* ── THRIVES / REGRETS ── */
.fit-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

@media (max-width: 600px) {
  .fit-grid { grid-template-columns: 1fr; }
}

.fit-card {
  border-left: 3px solid var(--sage);
  padding-left: 18px;
}

.fit-card.regret {
  border-left-color: var(--dustred);
}

.fit-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 12px;
  color: var(--sage);
}

.fit-card.regret .fit-label { color: var(--dustred); }

.fit-card ul {
  list-style: none;
}

.fit-card li {
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink-soft);
  margin-bottom: 10px;
}

/* ── QUOTES (clipped excerpt style) ── */
.quote-block {
  border-top: 1px solid var(--rule);
  padding: 22px 0;
}

.quote-block:last-child { border-bottom: 1px solid var(--rule); }

.quote-text {
  font-family: 'Source Serif 4', serif;
  font-size: 17px;
  line-height: 1.55;
  font-style: italic;
  margin-bottom: 10px;
  color: var(--ink);
}

.quote-source {
  font-size: 12px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* ── RELATED ── */
.related-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.related-pill {
  font-size: 13px;
  border: 1px solid var(--rule);
  padding: 8px 16px;
  border-radius: 100px;
  text-decoration: none;
  color: var(--ink);
  transition: all 0.15s;
}

.related-pill:hover {
  border-color: var(--ink);
  background: var(--paper-dim);
}

.not-found {
  text-align: center;
  padding: 80px 0;
  color: var(--ink-faint);
}
</style>
</head>
<body>

<div class="wrap" id="content">
  <a class="back-link" href="index.html">← Back to all careers</a>
</div>

<script>
const CATEGORY_LABELS = {
  medical: 'Medical', engineering: 'Engineering', commerce: 'Commerce',
  law: 'Law', design: 'Design', management: 'Management', paramedical: 'Paramedical'
};

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function parseSalaryToWidth(str, max) {
  // Extracts the largest number found (rough heuristic) to size the bar
  const nums = str.match(/[\d.]+/g);
  if (!nums) return 20;
  const val = Math.max(...nums.map(Number));
  return Math.min(100, Math.max(15, (val / max) * 100));
}

async function load() {
  const id = getParam('id');
  const res = await fetch('careers.json');
  const careers = await res.json();
  const career = careers.find(c => c.id === id);

  if (!career) {
    document.getElementById('content').innerHTML += `
      <div class="not-found">Career not found. <a href="index.html">Go back</a>.</div>
    `;
    return;
  }

  document.title = `${career.name} — Karriere`;

  const relatedHtml = (career.related_careers || []).map(rid => {
    const rc = careers.find(c => c.id === rid);
    return rc ? `<a class="related-pill" href="career.html?id=${rc.id}">${rc.name}</a>` : '';
  }).join('');

  document.getElementById('content').innerHTML += `
    <div class="masthead-small">Karriere</div>

    <div class="career-header">
      <div class="career-tag">${CATEGORY_LABELS[career.category] || career.category}</div>
      <h1 class="career-title">${career.name}</h1>
      <p class="career-tagline">${career.tagline}</p>
    </div>

    <div class="section">
      <div class="section-body">${career.overview}</div>
    </div>

    <div class="section">
      <div class="section-label">What nobody tells you</div>
      <ul class="pain-list">
        ${career.what_nobody_tells_you.map(p => `<li>${p}</li>`).join('')}
      </ul>
    </div>

    <div class="section">
      <div class="section-label">A day in the life</div>
      <div class="dayinlife-grid">
        <div class="dayinlife-card">
          <div class="dayinlife-role">As a student</div>
          <div class="dayinlife-text">${career.day_in_the_life.student}</div>
        </div>
        <div class="dayinlife-card">
          <div class="dayinlife-role">As a professional</div>
          <div class="dayinlife-text">${career.day_in_the_life.professional}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Salary progression</div>
      <div class="salary-track">
        <div class="salary-row">
          <div class="salary-stage">Entry</div>
          <div class="salary-bar-shell"><div class="salary-bar-fill" data-target="40"><span class="salary-value">${career.salary.entry}</span></div></div>
        </div>
        <div class="salary-row">
          <div class="salary-stage">Mid</div>
          <div class="salary-bar-shell"><div class="salary-bar-fill" data-target="68"><span class="salary-value">${career.salary.mid}</span></div></div>
        </div>
        <div class="salary-row">
          <div class="salary-stage">Senior</div>
          <div class="salary-bar-shell"><div class="salary-bar-fill" data-target="95"><span class="salary-value">${career.salary.senior}</span></div></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Scope</div>
      <div class="scope-grid">
        <div class="scope-card">
          <div class="section-label">In India</div>
          <div class="section-body" style="font-size:14px;color:var(--ink-soft)">${career.scope.india}</div>
        </div>
        <div class="scope-card">
          <div class="section-label">Abroad</div>
          <div class="section-body" style="font-size:14px;color:var(--ink-soft)">${career.scope.abroad}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Who it's for</div>
      <div class="fit-grid">
        <div class="fit-card">
          <div class="fit-label">Thrives here</div>
          <ul>${career.who_thrives.map(t => `<li>${t}</li>`).join('')}</ul>
        </div>
        <div class="fit-card regret">
          <div class="fit-label">Often regrets it</div>
          <ul>${career.who_regrets_it.map(t => `<li>${t}</li>`).join('')}</ul>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Real voices</div>
      ${career.real_experiences.map(q => `
        <div class="quote-block">
          <div class="quote-text">"${q.quote}"</div>
          <div class="quote-source">${q.source}</div>
        </div>
      `).join('')}
    </div>

    ${relatedHtml ? `
    <div class="section">
      <div class="section-label">Related paths</div>
      <div class="related-row">${relatedHtml}</div>
    </div>` : ''}
  `;

  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.salary-bar-fill').forEach(el => {
        el.style.width = el.dataset.target + '%';
      });
    }, 100);
  });
}

load();
</script>
</body>
</html>
