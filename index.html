<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karriere — The unfiltered career file</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F5F1E8;
  --surface: #ffffff;
  --ink: #2B2420;
  --ink-soft: rgba(43,36,32,0.75);
  --ink-faint: rgba(43,36,32,0.52);
  --rule: rgba(43,36,32,0.14);
  --rule-strong: rgba(43,36,32,0.26);
  --violet: #7A3B2E;
  --violet-dim: rgba(122,59,46,0.08);
  --amber: #B8722E;
  --amber-dim: rgba(184,114,46,0.12);
  --sage: #5B7A5B;
  --dustred: #A8452F;
  --shadow-sm: 0 1px 2px rgba(43,36,32,0.08);
  --shadow-md: 0 8px 22px rgba(43,36,32,0.12);
}

html { scroll-behavior: smooth; }

@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Manrope', sans-serif;
  min-height: 100vh;
}

button, input { font-family: inherit; }

:focus-visible {
  outline: 2px solid var(--amber);
  outline-offset: 2px;
  border-radius: 4px;
}

.wrap { max-width: 980px; margin: 0 auto; padding: 56px 28px 100px; }
.wrap.detail-wrap { max-width: 760px; }

#view { animation: fadeIn 0.35s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

#view.leaving { animation: fadeOut 0.18s ease forwards; }

@keyframes fadeOut {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-6px); }
}

/* ── MASTHEAD ── */
.masthead {
  border-bottom: 2px solid var(--ink);
  padding-bottom: 24px;
  margin-bottom: 8px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.wordmark {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 36px;
  letter-spacing: -0.01em;
  color: var(--ink);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
}

.masthead-meta {
  font-size: 12px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.masthead-small {
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 20px;
  margin-bottom: 4px;
  color: var(--ink);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  display: block;
}

.dateline {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding: 10px 0 40px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 48px;
}

/* ── HERO ── */
.hero {
  display: flex;
  gap: 40px;
  align-items: flex-start;
  margin-bottom: 48px;
}

.hero-main { flex: 1; min-width: 0; }

.hero-eyebrow {
  font-size: 12px;
  font-weight: 700;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 14px;
}

.hero h1 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: clamp(30px, 4.4vw, 46px);
  line-height: 1.15;
  max-width: 560px;
  margin-bottom: 16px;
  color: var(--ink);
}

.hero p {
  font-size: 16px;
  color: var(--ink-soft);
  max-width: 480px;
  line-height: 1.65;
  margin-bottom: 26px;
}

.hero-actions {
  display: flex;
  gap: 10px;
  max-width: 480px;
}

.hero-search {
  flex: 1;
  font-size: 14px;
  padding: 13px 16px;
  border: 1px solid var(--rule-strong);
  border-radius: 8px;
  background: var(--surface);
  color: var(--ink);
}

.hero-search::placeholder { color: var(--ink-faint); }
.hero-search:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-dim); }

.hero-cta {
  font-size: 14px;
  font-weight: 700;
  background: var(--amber);
  color: #fff;
  border: none;
  padding: 13px 22px;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 0.15s, box-shadow 0.15s;
}

.hero-cta:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

.hero-stats {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 22px;
  box-shadow: var(--shadow-sm);
}

.hero-stat { padding: 12px 0; border-bottom: 1px solid var(--rule); }
.hero-stat:last-child { border-bottom: none; padding-bottom: 0; }
.hero-stat:first-child { padding-top: 0; }

.hero-stat-num {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 26px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 4px;
}

.hero-stat-label {
  font-size: 11px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

@media (max-width: 760px) {
  .hero { flex-direction: column; }
  .hero-stats { width: 100%; }
}

/* ── FILTER ROW ── */
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 40px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--rule);
}

.filter-btn {
  font-size: 13px;
  font-weight: 600;
  background: var(--surface);
  border: 1px solid var(--rule-strong);
  color: var(--ink-soft);
  padding: 8px 18px;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.15s;
}

.filter-btn:hover { border-color: var(--violet); color: var(--violet); background: var(--violet-dim); }

.filter-btn.active {
  background: var(--violet);
  color: #fff;
  border-color: var(--violet);
  box-shadow: var(--shadow-sm);
}

.results-count {
  font-size: 12px;
  color: var(--ink-faint);
  margin: -16px 0 20px;
}

/* ── CAREER LIST ── */
.career-list { display: flex; flex-direction: column; gap: 10px; }

.career-entry {
  display: grid;
  grid-template-columns: 96px 1fr auto;
  align-items: center;
  gap: 20px;
  padding: 18px 20px;
  border: 1px solid var(--rule);
  color: var(--ink);
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  background: var(--surface);
  border-radius: 12px;
  width: 100%;
  text-align: left;
  box-shadow: var(--shadow-sm);
}

.career-entry:hover {
  border-color: var(--violet);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.career-entry:hover .entry-name { color: var(--violet); }

.entry-tag {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-faint);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}

.entry-icon { font-size: 16px; }

.entry-main { min-width: 0; }

.entry-name {
  font-family: 'Manrope', sans-serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
  transition: color 0.15s;
}

.entry-tagline { font-size: 14px; color: var(--ink-soft); line-height: 1.4; margin-bottom: 8px; }

.entry-salary {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  color: var(--amber);
  background: var(--amber-dim);
  padding: 3px 10px;
  border-radius: 100px;
}

.entry-arrow {
  font-size: 18px;
  color: var(--violet);
  opacity: 0;
  transition: opacity 0.15s, transform 0.15s;
}

.career-entry:hover .entry-arrow { opacity: 1; transform: translateX(4px); }

@media (max-width: 640px) {
  .career-entry { grid-template-columns: 1fr auto; }
  .entry-tag { display: none; }
  .entry-arrow { opacity: 1; }
}

.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-faint);
  font-size: 14px;
}

footer {
  margin-top: 60px;
  padding-top: 28px;
  border-top: 1px solid var(--rule);
  font-size: 12px;
  color: var(--ink-faint);
  display: flex;
  justify-content: space-between;
}

/* ── DETAIL ── */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--ink-soft);
  margin-bottom: 36px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  font-family: 'Manrope', sans-serif;
  transition: color 0.15s, gap 0.15s;
}

.back-link:hover { color: var(--violet); gap: 10px; }

.career-header {
  border-bottom: 2px solid var(--ink);
  padding-bottom: 28px;
  margin-bottom: 40px;
}

.career-tag {
  font-size: 11px;
  font-weight: 700;
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

.career-title {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: clamp(30px, 6vw, 44px);
  line-height: 1.1;
  margin-bottom: 14px;
  color: var(--ink);
}

.career-tagline {
  font-size: 17px;
  color: var(--ink-soft);
  font-style: italic;
  font-family: 'Manrope', sans-serif;
}

.section { margin-bottom: 48px; }

.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-faint);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--rule);
}

.section-body { font-size: 16px; line-height: 1.75; color: var(--ink); }

/* ── LOVE IT (positives) ── */
.love-list { list-style: none; }

.love-list li {
  position: relative;
  padding-left: 22px;
  margin-bottom: 12px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--ink);
}

.love-list li::before {
  content: "✦";
  position: absolute;
  left: 0;
  color: var(--sage);
  font-size: 11px;
  top: 3px;
}

/* ── PAIN POINTS ── */
.pain-list { list-style: none; }

.pain-list li {
  position: relative;
  padding-left: 22px;
  margin-bottom: 14px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--ink);
}

.pain-list li::before {
  content: "—";
  position: absolute;
  left: 0;
  color: var(--amber);
  font-weight: 700;
}

/* ── DAY IN THE LIFE ── */
.dayinlife-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 600px) { .dayinlife-grid { grid-template-columns: 1fr; } }

.dayinlife-card {
  background: var(--surface);
  border-radius: 10px;
  padding: 18px 20px;
  border: 1px solid var(--rule);
}

.dayinlife-role {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--violet);
  margin-bottom: 8px;
}

.dayinlife-text { font-size: 14px; line-height: 1.65; color: var(--ink-soft); }

/* ── SALARY BARS ── */
.salary-track { display: flex; flex-direction: column; gap: 18px; }

.salary-row { display: grid; grid-template-columns: 70px 1fr; align-items: center; gap: 16px; }

.salary-stage {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-faint);
}

.salary-bar-shell {
  position: relative;
  height: 36px;
  background: var(--surface);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--rule);
}

.salary-bar-fill {
  height: 100%;
  border-radius: 8px;
  display: flex;
  align-items: center;
  transition: width 1.1s cubic-bezier(0.16, 1, 0.3, 1);
  width: 0;
}

.salary-row:nth-child(1) .salary-bar-fill { background: rgba(43,36,32,0.22); }
.salary-row:nth-child(2) .salary-bar-fill { background: var(--sage); }
.salary-row:nth-child(3) .salary-bar-fill { background: var(--amber); }

.salary-value {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  padding-left: 14px;
  white-space: nowrap;
}

.salary-row:nth-child(1) .salary-value { color: var(--ink); padding-left: 0; margin-left: 14px; }

/* ── SCOPE ── */
.scope-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 600px) { .scope-grid { grid-template-columns: 1fr; } }

.scope-card {
  background: var(--surface);
  border-radius: 10px;
  padding: 18px 20px;
  border: 1px solid var(--rule);
}

.scope-card .section-label { border-bottom: none; padding-bottom: 0; margin-bottom: 8px; }
.scope-text { font-size: 14px; line-height: 1.65; color: var(--ink-soft); }

/* ── FIT ── */
.fit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 600px) { .fit-grid { grid-template-columns: 1fr; } }

.fit-card {
  border-left: 3px solid var(--sage);
  padding-left: 18px;
}

.fit-card.struggle { border-left-color: var(--dustred); }

.fit-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 12px;
  color: var(--sage);
}

.fit-card.struggle .fit-label { color: var(--dustred); }

.fit-card ul { list-style: none; }

.fit-card li {
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink-soft);
  margin-bottom: 10px;
}

/* ── QUOTES ── */
.quote-block { border-top: 1px solid var(--rule); padding: 22px 0; }
.quote-block:last-child { border-bottom: 1px solid var(--rule); }

.quote-text {
  font-family: 'Manrope', sans-serif;
  font-size: 17px;
  line-height: 1.55;
  font-style: italic;
  margin-bottom: 10px;
  color: var(--ink);
}

.quote-source {
  font-size: 12px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  text-decoration: none;
  transition: color 0.15s;
}

.quote-source:hover { color: var(--violet); }

/* ── RELATED ── */
.related-row { display: flex; gap: 10px; flex-wrap: wrap; }

.related-pill {
  font-size: 13px;
  border: 1px solid var(--rule-strong);
  padding: 8px 18px;
  border-radius: 100px;
  color: var(--ink);
  transition: all 0.15s;
  background: var(--surface);
  cursor: pointer;
  font-family: 'Manrope', sans-serif;
}

.related-pill:hover { border-color: var(--violet); color: var(--violet); background: var(--violet-dim); }

.not-found { text-align: center; padding: 80px 0; color: var(--ink-faint); }
</style>
</head>
<body>

<div id="view"></div>

<script>
let careers = [];
let activeCategory = 'all';
let searchQuery = '';

const CATEGORY_LABELS = {
  medical: 'Medical', engineering: 'Engineering', commerce: 'Commerce',
  law: 'Law', design: 'Design', management: 'Management', paramedical: 'Paramedical'
};

const CATEGORY_ICONS = {
  medical: '🩺', engineering: '⚙️', commerce: '📊',
  law: '⚖️', design: '🎨', management: '📈', paramedical: '⛑️'
};

async function loadCareers() {
  if (careers.length) return;
  const res = await fetch('careers.json');
  careers = await res.json();
}

function formatEntrySalary(entry) {
  if (!entry) return null;
  // Take the first clause before any parenthetical detail, then pull the first
  // concrete figure and its unit. This is a hard floor number, not a guess —
  // it only works cleanly because each career's entry salary now states its
  // starting figure with the unit attached to it directly.
  const firstSegment = entry.split('(')[0].trim();
  const numMatch = firstSegment.match(/₹[\d,.]+/);
  if (!numMatch) return null;
  const unitMatch = firstSegment.match(/\/month|LPA|lakh|crore/i);
  const unitText = unitMatch ? (unitMatch[0].startsWith('/') ? unitMatch[0] : ' ' + unitMatch[0]) : '';
  return `From ${numMatch[0]}${unitText}`;
}

function navigate(hash) { window.location.hash = hash; }

function getFilteredCareers() {
  let list = activeCategory === 'all' ? careers : careers.filter(c => c.category === activeCategory);
  if (searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    list = list.filter(c => c.name.toLowerCase().includes(q) || c.tagline.toLowerCase().includes(q));
  }
  return list;
}

function renderListView() {
  const cats = [...new Set(careers.map(c => c.category))];
  const filtered = getFilteredCareers();
  const totalVoices = careers.reduce((sum, c) => sum + (c.real_experiences ? c.real_experiences.length : 0), 0);

  const filterButtons = `<button class="filter-btn ${activeCategory === 'all' ? 'active' : ''}" data-cat="all">All</button>` +
    cats.map(cat => `<button class="filter-btn ${activeCategory === cat ? 'active' : ''}" data-cat="${cat}">${CATEGORY_LABELS[cat] || cat}</button>`).join('');

  const listHtml = filtered.length ? filtered.map(c => `
    <button class="career-entry" data-id="${c.id}">
      <div class="entry-tag"><span class="entry-icon">${CATEGORY_ICONS[c.category] || '•'}</span>${CATEGORY_LABELS[c.category] || c.category}</div>
      <div class="entry-main">
        <div class="entry-name">${c.name}</div>
        <div class="entry-tagline">${c.tagline}</div>
        ${c.salary && c.salary.entry ? `<span class="entry-salary">${formatEntrySalary(c.salary.entry)}</span>` : ''}
      </div>
      <div class="entry-arrow">→</div>
    </button>
  `).join('') : `<div class="no-results">No careers match "${searchQuery}". Try a different search or clear the filter.</div>`;

  return `
    <div class="wrap">
      <div class="masthead">
        <button class="wordmark">Karriere</button>
        <div class="masthead-meta">Vol. 1 — India Edition</div>
      </div>
      <div class="dateline">
        <span>${new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
        <span>The unfiltered career file</span>
      </div>
      <div class="hero">
        <div class="hero-main">
          <div class="hero-eyebrow">Before you choose</div>
          <h1>What career counsellors won't tell a 17-year-old.</h1>
          <p>Verified salaries, honest timelines, and anonymous accounts from people who lived each path — including the regrets, the burnout, and the work-life trade-offs nobody puts on a brochure.</p>
          <div class="hero-actions">
            <input type="text" class="hero-search" id="hero-search" placeholder="Search a career, e.g. 'law' or 'design'" value="${searchQuery}">
            <button class="hero-cta" data-nav-scroll="list-section">Explore careers</button>
          </div>
        </div>
        <div class="hero-stats">
          <div class="hero-stat">
            <div class="hero-stat-num">${careers.length}</div>
            <div class="hero-stat-label">Careers profiled</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-num">${cats.length}</div>
            <div class="hero-stat-label">Fields covered</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-num">${totalVoices}</div>
            <div class="hero-stat-label">Testimonies shared</div>
          </div>
        </div>
      </div>
      <div class="filter-row" id="list-section">${filterButtons}</div>
      <div class="results-count">Showing ${filtered.length} of ${careers.length} careers</div>
      <div class="career-list">${listHtml}</div>
      <footer>
        <span>Karriere — built for students who deserve the truth.</span>
        <span>${careers.length} careers profiled</span>
      </footer>
    </div>
  `;
}

function renderDetailView(id) {
  const career = careers.find(c => c.id === id);
  if (!career) return `<div class="wrap detail-wrap"><button class="back-link" data-nav="">← Back</button><div class="not-found">Career not found.</div></div>`;

  const relatedHtml = (career.related_careers || []).map(rid => {
    const rc = careers.find(c => c.id === rid);
    return rc ? `<button class="related-pill" data-nav="${rc.id}">${rc.name}</button>` : '';
  }).join('');

  const loveSection = career.why_people_love_it ? `
    <div class="section">
      <div class="section-label">Why people love it</div>
      <ul class="love-list">${career.why_people_love_it.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>
  ` : '';

  return `
    <div class="wrap detail-wrap">
      <button class="back-link" data-nav="">← Back to all careers</button>
      <button class="masthead-small">Karriere</button>

      <div class="career-header">
        <div class="career-tag">${CATEGORY_ICONS[career.category] || ''} ${CATEGORY_LABELS[career.category] || career.category}</div>
        <h1 class="career-title">${career.name}</h1>
        <p class="career-tagline">${career.tagline}</p>
      </div>

      <div class="section">
        <div class="section-body">${career.overview}</div>
      </div>

      ${loveSection}

      <div class="section">
        <div class="section-label">Who thrives here</div>
        <div class="fit-grid">
          <div class="fit-card">
            <div class="fit-label">Thrives here</div>
            <ul>${career.who_thrives.map(t => `<li>${t}</li>`).join('')}</ul>
          </div>
          <div class="fit-card struggle">
            <div class="fit-label">Who might struggle</div>
            <ul>${career.who_regrets_it.map(t => `<li>${t}</li>`).join('')}</ul>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">A day in the life</div>
        <div class="dayinlife-grid">
          <div class="dayinlife-card">
            <div class="dayinlife-role">As a student</div>
            <div class="dayinlife-text">${career.day_in_the_life.student}</div>
          </div>
          <div class="dayinlife-card">
            <div class="dayinlife-role">As a professional</div>
            <div class="dayinlife-text">${career.day_in_the_life.professional}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Salary progression</div>
        <div class="salary-track">
          <div class="salary-row">
            <div class="salary-stage">Entry</div>
            <div class="salary-bar-shell"><div class="salary-bar-fill" data-target="40"><span class="salary-value">${career.salary.entry}</span></div></div>
          </div>
          <div class="salary-row">
            <div class="salary-stage">Mid</div>
            <div class="salary-bar-shell"><div class="salary-bar-fill" data-target="68"><span class="salary-value">${career.salary.mid}</span></div></div>
          </div>
          <div class="salary-row">
            <div class="salary-stage">Senior</div>
            <div class="salary-bar-shell"><div class="salary-bar-fill" data-target="95"><span class="salary-value">${career.salary.senior}</span></div></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Scope</div>
        <div class="scope-grid">
          <div class="scope-card">
            <div class="section-label">In India</div>
            <div class="scope-text">${career.scope.india}</div>
          </div>
          <div class="scope-card">
            <div class="section-label">Abroad</div>
            <div class="scope-text">${career.scope.abroad}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">What nobody tells you</div>
        <ul class="pain-list">${career.what_nobody_tells_you.map(p => `<li>${p}</li>`).join('')}</ul>
      </div>

      <div class="section">
        <div class="section-label">Testimonies</div>
        ${career.real_experiences.map(q => `
          <div class="quote-block">
            <div class="quote-text">"${q.quote}"</div>
            <a class="quote-source" href="${q.url}" target="_blank" rel="noopener noreferrer">${q.source}${q.url ? ' ↗' : ''}</a>
          </div>
        `).join('')}
      </div>

      ${relatedHtml ? `
      <div class="section">
        <div class="section-label">Related paths</div>
        <div class="related-row">${relatedHtml}</div>
      </div>` : ''}
    </div>
  `;
}

function attachListeners() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => { activeCategory = btn.dataset.cat; render(false); });
  });
  document.querySelectorAll('.career-entry').forEach(btn => {
    btn.addEventListener('click', () => navigate('#' + btn.dataset.id));
  });
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.nav ? '#' + btn.dataset.nav : ''));
  });
  document.querySelectorAll('.wordmark, .masthead-small').forEach(el => {
    el.addEventListener('click', () => navigate(''));
  });
  document.querySelectorAll('.salary-bar-fill').forEach(el => {
    requestAnimationFrame(() => setTimeout(() => { el.style.width = el.dataset.target + '%'; }, 80));
  });
  const searchInput = document.getElementById('hero-search');
  if (searchInput) {
    searchInput.addEventListener('input', async () => {
      searchQuery = searchInput.value;
      const cursorPos = searchInput.selectionStart;
      await render(false);
      const newInput = document.getElementById('hero-search');
      if (newInput) {
        newInput.focus();
        newInput.setSelectionRange(cursorPos, cursorPos);
      }
    });
  }
  const scrollBtn = document.querySelector('[data-nav-scroll]');
  if (scrollBtn) {
    scrollBtn.addEventListener('click', () => {
      document.getElementById(scrollBtn.dataset.navScroll)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  }
}

async function render(animate = true) {
  await loadCareers();
  const view = document.getElementById('view');
  const id = window.location.hash.replace('#', '');
  if (animate) {
    view.classList.add('leaving');
    await new Promise(r => setTimeout(r, 150));
  }
  view.innerHTML = id ? renderDetailView(id) : renderListView();
  view.classList.remove('leaving');
  if (animate) window.scrollTo({ top: 0, behavior: 'instant' });
  attachListeners();
  const searchInput = document.getElementById('hero-search');
  if (searchInput && document.activeElement !== searchInput && searchQuery) {
    // preserve focus/caret only when re-rendering from typing; no-op on hash nav
  }
}

window.addEventListener('hashchange', () => render(true));
render(true);
</script>
</body>
</html>
